<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Anniversaire Inaya 🎂</title>
<style>
html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:Arial; background:black; }
#matrixCanvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }

/* PHONE */
.phone-container {
    width:320px; height:650px; 
    background: linear-gradient(135deg, #2ecc71, #27ae60); /* dégradé vert */
    border-radius:30px; overflow:hidden; 
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) scale(0); z-index:1;
    box-shadow:0 0 30px #27ae60; display:flex; flex-direction:column;
}

/* HEURE */
.time-display {
    text-align:center; font-size:28px; color:white; padding:10px; font-weight:bold;
    display:flex; justify-content:center; align-items:center;
    background:rgba(46, 204, 113,0.5); border-radius:12px;
}

/* LOCKSCREEN */
.lockscreen{
    width:100%; height:100%; 
    background:linear-gradient(135deg,#2ecc71,#27ae60); 
    display:flex; flex-direction:column; justify-content:center; align-items:center; color:white;
}
.unlock-btn{
    margin-top:20px; padding:10px 20px; border-radius:20px; border:none; 
    background:#27ae60; cursor:pointer; color:white; font-weight:bold;
}

/* HOME */
.home{ display:none; width:100%; height:100%; padding:10px; box-sizing:border-box; }
.apps{
    display:grid; grid-template-columns:repeat(3,1fr); gap:15px; justify-items:center; margin-top:20px;
}
.app{
    display:flex; flex-direction:column; align-items:center; cursor:pointer; transition: transform 0.2s;
}
.app:hover{ transform:scale(1.15); }
.app-icon{
    font-size:36px; background:black; border-radius:15px; padding:15px; color:white;
    box-shadow:0 0 15px #27ae60;
}
.app-name{ margin-top:5px; color:white; font-weight:bold; text-shadow:0 0 5px #27ae60; }

/* MESSAGES */
.msg-list, .chat{ display:none; width:100%; height:100%; background:black; color:white; padding:10px; box-sizing:border-box; position:relative; }
.person{ padding:10px; margin:10px 0; background:rgba(255,255,255,0.1); border-radius:15px; cursor:pointer; }
.back-btn{ background:#27ae60; color:white; border:none; padding:8px 12px; border-radius:12px; cursor:pointer; position:absolute; top:10px; left:10px; z-index:10; }
.msg{ background:black; color:white; padding:8px; border-radius:12px; margin:5px 0; width:fit-content; }

/* FACEBOOK */
.facebook{
    display:none; 
    flex-direction:column; 
    width:320px; height:650px; 
    background:#3b5998; 
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:2; 
    border-radius:30px; 
    overflow:hidden; 
    color:white;
}
#facebookChatContainer{ flex-grow:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; }
#fbInput{
    flex-shrink:0; width: calc(100% - 20px); margin:0 10px 10px 10px; padding:10px;
    border-radius:12px; border:none; background:black; color:white; font-size:16px;
}
.facebook-chat{ padding:8px; border-radius:12px; margin:5px 0; max-width:80%; word-wrap:break-word; }

/* GENERAL */
h2,h3{ margin-top:0; margin-bottom:10px; }
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="phone-container" id="phone">
    <div class="time-display" id="timeDisplay">00:00</div>

    <!-- LOCKSCREEN -->
    <div class="lockscreen" id="lock">
        <h1>Inaya 💖</h1>
        <button class="unlock-btn" onclick="unlock()">Déverrouiller 🔓</button>
    </div>

    <!-- HOME -->
    <div class="home" id="home">
        <div class="apps">
            <div class="app"><div class="app-icon">📷</div><div class="app-name">Appareil</div></div>
            <div class="app"><div class="app-icon">🎵</div><div class="app-name">Musique</div></div>
            <div class="app" onclick="openMsgList()"><div class="app-icon">💬</div><div class="app-name">Messages</div></div>
            <div class="app" onclick="openFacebook()"><div class="app-icon">🌐</div><div class="app-name">Facebook</div></div>
            <div class="app"><div class="app-icon">📱</div><div class="app-name">Téléphone</div></div>
            <div class="app"><div class="app-icon">⚙️</div><div class="app-name">Paramètres</div></div>
        </div>
    </div>

    <!-- MESSAGES LIST -->
    <div class="msg-list" id="msgList">
        <button class="back-btn" onclick="backToHomeFromMsg()">⬅️ Retour</button>
        <h2>💬 Messages</h2>
        <div class="person" onclick="openChat('Maman')">Maman</div>
        <div class="person" onclick="openChat('Alexis')">Alexis</div>
        <div class="person" onclick="openChat('Tante')">Tante</div>
        <div class="person" onclick="openChat('Cousin')">Cousin</div>
    </div>

    <!-- CHAT -->
    <div class="chat" id="chat">
        <button class="back-btn" onclick="backToList()">⬅️ Retour</button>
        <h3 id="chatName"></h3>
        <div id="chatContainer" style="overflow-y:auto; height:90%; margin-top:40px;"></div>
    </div>
</div>

<!-- FACEBOOK avec coins arrondis -->
<div class="facebook" id="facebook">
    <button class="back-btn" onclick="backToHomeFromFB()">⬅️ Retour</button>
    <h2>🌐 Facebook</h2>
    <div id="facebookChatContainer"></div>
    <input type="text" id="fbInput" placeholder="Écris un message...">
</div>

<script>
// ===== MATRIX =====
const canvas=document.getElementById('matrixCanvas');
const ctx=canvas.getContext('2d');
let width=canvas.width=window.innerWidth;
let height=canvas.height=window.innerHeight;
const cols=Math.floor(width/20);
const ypos=Array(cols).fill(0);

function matrix(){
    ctx.fillStyle='rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,width,height);
    ctx.fillStyle='#0f0';
    ctx.font='20px monospace';
    ypos.forEach((y,i)=>{
        const text=Math.random()>0.5?'0':'1';
        ctx.fillText(text,i*20,y);
        ypos[i]=(y>height && Math.random()>0.975)?0:y+20;
    });
}
const matrixInterval=setInterval(matrix,50);

// ===== SHOW PHONE =====
function showPhone(){
    clearInterval(matrixInterval);
    canvas.style.display='none';
    const phone=document.getElementById('phone');
    phone.style.transition='transform 0.5s, opacity 0.5s';
    phone.style.transform='translate(-50%,-50%) scale(1)';
    phone.style.opacity='1';
}
setTimeout(showPhone,3000);

// ===== TIME =====
const timeDisplay=document.getElementById('timeDisplay');
function updateTime(){
    const now=new Date();
    timeDisplay.innerText=now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
}
setInterval(updateTime,1000);
updateTime();
function unlock(){ document.getElementById('lock').style.display='none'; document.getElementById('home').style.display='block'; }

// ===== MESSAGES =====
const messagesData={
"Maman":["Joyeux anniversaire ma chérie ! 💖","Profite bien de ta journée ! 🎂"],
"Alexis":["Hey Inaya ! 🥳","Bonne anniversaire ! On se voit pour le fêter 🎉"],
"Tante":["Ma petite Inaya, 14 ans déjà ! 😍","Bisous 😘"],
"Cousin":["Yo Inaya ! 🎉","Trop hâte de fêter ça !"]
};
function openMsgList(){ document.getElementById('home').style.display='none'; document.getElementById('msgList').style.display='block'; }
function openChat(name){
    document.getElementById('msgList').style.display='none';
    document.getElementById('chat').style.display='block';
    document.getElementById('chatName').innerText=name;
    const container=document.getElementById('chatContainer');
    container.innerHTML='';
    messagesData[name].forEach(msg=>{
        const div=document.createElement('div');
        div.className='msg';
        div.innerText=msg;
        container.appendChild(div);
    });
    container.scrollTop=container.scrollHeight;
}
function backToList(){ document.getElementById('chat').style.display='none'; document.getElementById('msgList').style.display='block'; }
function backToHomeFromMsg(){ document.getElementById('msgList').style.display='none'; document.getElementById('home').style.display='block'; }

// ===== FACEBOOK =====
let hugoMessages=["Bonne anniversaire Inaya ! 🎉","J'espère que t'as bien aimé mon cadeau 🎁","Dommage que je sois pas là après les vacances 😔","Bon bah profite bien de ta journée et bye 👋"];
let hugoIndex=0,hugoReplied=false;
function openFacebook(){
    document.getElementById('home').style.display='none';
    const fbApp=document.getElementById('facebook');
    fbApp.style.display='flex';
    const fbContainer=document.getElementById('facebookChatContainer');
    fbContainer.innerHTML=''; hugoIndex=0; hugoReplied=false;
    const interval=setInterval(()=>{
        if(hugoIndex>=hugoMessages.length){ clearInterval(interval); return; }
        addFBMessage(hugoMessages[hugoIndex]);
        hugoIndex++;
    },1000);
    const fbInput=document.getElementById('fbInput');
    fbInput.focus();
    fbInput.onkeydown=function(e){
        if(e.key==='Enter' && !e.shiftKey){
            e.preventDefault();
            const text=fbInput.value.trim();
            if(text==='') return;
            addFBMessage(text,false);
            fbInput.value='';
            if(!hugoReplied){
                hugoReplied=true;
                setTimeout(()=>addFBMessage("Ok, ne déprime pas, profite de cette journée incroyable ! 🎉"),500);
                setTimeout(()=>addFBMessage("Moi ça va, si tu veux savoir"),1000);
            }
        }
    }
}
function addFBMessage(text,fromHugo=true){
    const fbContainer=document.getElementById('facebookChatContainer');
    const div=document.createElement('div');
    div.className='facebook-chat';
    if(fromHugo){ div.style.background='rgba(255,255,255,0.2)'; div.style.color='white'; div.style.alignSelf='flex-start'; }
    else{ div.style.background='#27ae60'; div.style.color='white'; div.style.alignSelf='flex-end'; }
    div.innerText=text;
    fbContainer.appendChild(div);
    fbContainer.scrollTop=fbContainer.scrollHeight;
}
function backToHomeFromFB(){ document.getElementById('facebook').style.display='none'; document.getElementById('home').style.display='block'; }

// ===== RESIZE =====
window.addEventListener('resize',()=>{ width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; });
</script>
</body>
</html>
